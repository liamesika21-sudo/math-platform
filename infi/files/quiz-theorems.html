<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>חזרה על הגדרות — אינפי 1</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Rubik, sans-serif;
    background: #f8fafc; color: #1e293b;
    padding: 20px 16px 90px; max-width: 860px; margin: 0 auto;
  }
  .hero {
    background: linear-gradient(135deg, #0f172a, #334155);
    color: white; border-radius: 16px; padding: 24px; margin-bottom: 20px;
  }
  .hero h1 { font-size: 1.4rem; font-weight: 800; margin-bottom: 4px; }
  .hero p { font-size: 0.82rem; opacity: 0.85; line-height: 1.6; }
  .progress-wrap { margin-top: 14px; }
  .progress-bar { height: 6px; background: rgba(255,255,255,0.15); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg,#6366f1,#10b981); border-radius: 99px; transition: width .4s; }
  .progress-txt { font-size: .72rem; opacity: .7; margin-top: 4px; text-align: center; }

  .section-label {
    font-size: .78rem; font-weight: 700; color: #94a3b8; margin: 22px 0 6px;
    text-transform: uppercase; letter-spacing: .5px;
  }

  .card {
    background: white; border: 1px solid #e2e8f0; border-radius: 14px;
    padding: 18px; margin-bottom: 14px;
  }
  .card-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .card-num {
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 700; font-size: .78rem; flex-shrink: 0;
  }
  .cat-sets .card-num { background: #6366f1; }
  .cat-limits .card-num { background: #f59e0b; }
  .cat-continuity .card-num { background: #10b981; }
  .cat-derivatives .card-num { background: #ef4444; }

  .card-title { font-weight: 700; font-size: .98rem; }
  .card-prompt {
    background: #f1f5f9; border-radius: 10px; padding: 10px 14px;
    font-size: .82rem; color: #475569; line-height: 1.7;
    margin-bottom: 10px; border-right: 3px solid #cbd5e1;
  }

  .field { margin-bottom: 10px; }
  .field label { display: block; font-size: .75rem; font-weight: 700; color: #64748b; margin-bottom: 4px; }
  .field textarea {
    width: 100%; min-height: 68px; border: 1.5px solid #e2e8f0; border-radius: 10px;
    padding: 10px 12px; font-size: .86rem; font-family: inherit; line-height: 1.7;
    resize: vertical; direction: rtl;
  }
  .field textarea:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.12); }

  /* LaTeX toolbar */
  .latex-bar {
    display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px;
  }
  .latex-bar button {
    padding: 4px 8px; border-radius: 6px; border: 1px solid #e2e8f0;
    background: white; font-size: .74rem; cursor: pointer; font-family: inherit;
    transition: all .12s; color: #475569;
  }
  .latex-bar button:hover { background: #eef2ff; border-color: #6366f1; color: #4338ca; }
  .latex-bar .sep { width: 1px; background: #e2e8f0; margin: 0 2px; }

  /* Preview */
  .preview-box {
    min-height: 30px; padding: 8px 12px; background: #fefce8; border: 1px dashed #fbbf24;
    border-radius: 8px; font-size: .85rem; line-height: 1.8; margin-bottom: 10px;
    display: none;
  }
  .preview-box.visible { display: block; }
  .preview-box .katex { font-size: 1em; }

  /* Confidence */
  .confidence { display: flex; gap: 5px; }
  .confidence button {
    flex: 1; padding: 6px; border-radius: 8px; border: 1.5px solid #e2e8f0;
    background: white; font-size: .76rem; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: all .15s;
  }
  .confidence button:hover { background: #f1f5f9; }
  .confidence button.active-strong { border-color: #10b981; background: #ecfdf5; color: #047857; }
  .confidence button.active-ok { border-color: #f59e0b; background: #fffbeb; color: #b45309; }
  .confidence button.active-weak { border-color: #ef4444; background: #fef2f2; color: #b91c1c; }

  /* Bottom bar */
  .actions {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: white; border-top: 1px solid #e2e8f0;
    padding: 10px 16px; display: flex; gap: 8px; justify-content: center; z-index: 50;
  }
  .actions button {
    padding: 9px 20px; border-radius: 10px; font-size: .85rem;
    font-weight: 700; cursor: pointer; border: none; font-family: inherit;
  }
  .btn-dl { background: #0f172a; color: white; }
  .btn-dl:hover { background: #1e293b; }
  .btn-clr { background: #f1f5f9; color: #64748b; }
  .btn-clr:hover { background: #e2e8f0; }
</style>
</head>
<body>

<div class="hero">
  <h1>חזרה על הגדרות — אינפי 1</h1>
  <p>לכל הגדרה כתבי את הניסוח <strong>במילים שלך</strong>. אפשר להשתמש בכפתורי LaTeX למטה.<br>בסוף — הורידי קובץ ושלחי לבדיקה.</p>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="pFill" style="width:0%"></div></div>
    <div class="progress-txt" id="pTxt">0 / 0</div>
  </div>
</div>

<div id="quiz"></div>

<div class="actions">
  <button class="btn-dl" onclick="download()">📥 הורדת תשובות</button>
  <button class="btn-clr" onclick="clearAll()">🗑 נקה</button>
</div>

<script>
// ════════════════════════════════════════
// QUESTIONS DATA
// ════════════════════════════════════════
const Q = [
  // ── חסמים וקבוצות (1-5) ──
  { id:1, cat:'sets', name:'חסם מלעיל', prompt:'הגדירי מהו חסם מלעיל של קבוצה A ⊆ ℝ.' },
  { id:2, cat:'sets', name:'חסם מלרע', prompt:'הגדירי מהו חסם מלרע של קבוצה A ⊆ ℝ.' },
  { id:3, cat:'sets', name:'סופרמום (sup)', prompt:'הגדירי מהו sup(A). למה הוא לא בהכרח שייך ל-A?' },
  { id:4, cat:'sets', name:'אינפימום (inf)', prompt:'הגדירי מהו inf(A).' },
  { id:5, cat:'sets', name:'מקסימום (max)', prompt:'הגדירי מהו max(A). מה ההבדל מ-sup?' },
  { id:6, cat:'sets', name:'מינימום (min)', prompt:'הגדירי מהו min(A).' },
  { id:7, cat:'sets', name:'חסומה מלמעלה', prompt:'מתי קבוצה A חסומה מלמעלה?' },
  { id:8, cat:'sets', name:'חסומה מלמטה', prompt:'מתי קבוצה A חסומה מלמטה?' },
  { id:9, cat:'sets', name:'תכונת ארכימדס', prompt:'נסחי את תכונת ארכימדס. על מה היא מדברת — טבעיים או ממשיים?' },
  { id:10, cat:'sets', name:'קבוצה צפופה', prompt:'מתי אומרים ש-A צפופה ב-ℝ? תני דוגמה לקבוצה צפופה.' },
  { id:11, cat:'sets', name:'תכונת ε של sup', prompt:'נסחי את תכונת ε של sup(A). מה ה"כיוון" של האי-שוויון?' },
  { id:12, cat:'sets', name:'תכונת ε של inf', prompt:'נסחי את תכונת ε של inf(A).' },

  // ── גבולות (8-15) ──
  { id:13, cat:'limits', name:'גבול של פונקציה בנקודה (ε-δ)', prompt:'הגדירי: lim(x→x₀) f(x) = L. שימי לב לסימני < ו->!' },
  { id:14, cat:'limits', name:'גבול חד-צדדי מימין', prompt:'הגדירי: lim(x→x₀⁺) f(x) = L.' },
  { id:15, cat:'limits', name:'גבול חד-צדדי משמאל', prompt:'הגדירי: lim(x→x₀⁻) f(x) = L.' },
  { id:16, cat:'limits', name:'גבול באינסוף', prompt:'הגדירי: lim(x→∞) f(x) = L. מה התפקיד של M לעומת δ?' },
  { id:17, cat:'limits', name:'גבול במינוס אינסוף', prompt:'הגדירי: lim(x→−∞) f(x) = L.' },
  { id:18, cat:'limits', name:'גבול אינסופי בנקודה', prompt:'הגדירי: lim(x→x₀) f(x) = ∞.' },
  { id:19, cat:'limits', name:'גבול אינסופי שלילי בנקודה', prompt:'הגדירי: lim(x→x₀) f(x) = −∞.' },
  { id:20, cat:'limits', name:'שכונה מחוקה', prompt:'מהי שכונה מחוקה של x₀? מה ההבדל משכונה רגילה?' },
  { id:21, cat:'limits', name:'פונקציה חסומה בסביבה', prompt:'מתי f חסומה בשכונה (מחוקה) של x₀?' },

  // ── רציפות (15-18) ──
  { id:22, cat:'continuity', name:'רציפות בנקודה', prompt:'הגדירי: f רציפה ב-x₀. מה ההבדל מהגדרת גבול (רמז: 0<)?' },
  { id:23, cat:'continuity', name:'רציפות מימין', prompt:'הגדירי: f רציפה מימין ב-x₀.' },
  { id:24, cat:'continuity', name:'רציפות משמאל', prompt:'הגדירי: f רציפה משמאל ב-x₀.' },
  { id:25, cat:'continuity', name:'רציפות על קטע סגור', prompt:'מתי f רציפה על [a,b]? מה קורה בקצוות?' },
  { id:26, cat:'continuity', name:'אי-רציפות סליקה', prompt:'מהי אי-רציפות סליקה (removable)? איך "מתקנים" אותה?' },

  // ── נגזרות (18-23) ──
  { id:27, cat:'derivatives', name:'נגזרת בנקודה', prompt:'הגדירי: f\'(x₀). כתבי את שתי הצורות (עם h ועם x).' },
  { id:28, cat:'derivatives', name:'גזירה בנקודה', prompt:'מתי f גזירה ב-x₀?' },
  { id:29, cat:'derivatives', name:'גזירה על קטע', prompt:'מתי f גזירה על (a,b)? ועל [a,b]?' },
  { id:30, cat:'derivatives', name:'פונקציה עולה', prompt:'הגדירי: f עולה בקטע I. מה ההבדל בין עולה לעולה ממש?' },
  { id:31, cat:'derivatives', name:'פונקציה יורדת', prompt:'הגדירי: f יורדת בקטע I.' },
  { id:32, cat:'derivatives', name:'קיצון מקומי', prompt:'הגדירי מקסימום מקומי ומינימום מקומי.' },
  { id:33, cat:'derivatives', name:'נקודה קריטית', prompt:'מהי נקודה קריטית של f? (שני מקרים!)' },
  { id:34, cat:'derivatives', name:'נקודת פיתול', prompt:'מהי נקודת פיתול? מה צריך להשתנות?' },
  { id:35, cat:'derivatives', name:'פונקציה קעורה/קמורה', prompt:'מתי f קמורה (concave up)? מתי קעורה (concave down)? מה הקשר ל-f\'\'?' },
];

const SECTIONS = {
  sets: '📐 חסמים וקבוצות (הרצאות 1-5)',
  limits: '📈 גבולות (הרצאות 8-15)',
  continuity: '🔗 רציפות (הרצאות 15-18)',
  derivatives: '📉 נגזרות (הרצאות 18-23)',
};

// LaTeX snippets for the toolbar
const LATEX_BTNS = [
  { label:'∀ε>0', insert:'\\forall \\varepsilon > 0' },
  { label:'∃δ>0', insert:'\\exists \\delta > 0' },
  { label:'∃M>0', insert:'\\exists M > 0' },
  { label:'|x−x₀|<δ', insert:'|x - x_0| < \\delta' },
  { label:'|f(x)−L|<ε', insert:'|f(x) - L| < \\varepsilon' },
  { label:'0<|·|', insert:'0 < |x - x_0|' },
  { sep:true },
  { label:'x→x₀', insert:'x \\to x_0' },
  { label:'x→∞', insert:'x \\to \\infty' },
  { label:'x→−∞', insert:'x \\to -\\infty' },
  { label:'lim', insert:'\\lim_{x \\to x_0}' },
  { sep:true },
  { label:'≤', insert:'\\le' },
  { label:'≥', insert:'\\ge' },
  { label:'≠', insert:'\\ne' },
  { label:'∈', insert:'\\in' },
  { label:'⊆', insert:'\\subseteq' },
  { sep:true },
  { label:'ℝ', insert:'\\mathbb{R}' },
  { label:'ℚ', insert:'\\mathbb{Q}' },
  { label:'ℕ', insert:'\\mathbb{N}' },
  { label:'sup', insert:'\\sup(A)' },
  { label:'inf', insert:'\\inf(A)' },
  { sep:true },
  { label:'f\'(x₀)', insert:"f'(x_0)" },
  { label:'frac', insert:'\\frac{a}{b}' },
  { label:'[a,b]', insert:'[a,b]' },
  { label:'(a,b)', insert:'(a,b)' },
];

// ════════════════════════════════════════
// RENDER
// ════════════════════════════════════════
function render() {
  const c = document.getElementById('quiz');
  let html = '';
  let curCat = '';

  Q.forEach(q => {
    if (q.cat !== curCat) {
      curCat = q.cat;
      html += `<div class="section-label">${SECTIONS[q.cat]}</div>`;
    }
    const saved = load(q.id);
    html += `
      <div class="card cat-${q.cat}" id="card-${q.id}">
        <div class="card-head">
          <span class="card-num">${q.id}</span>
          <span class="card-title">${q.name}</span>
        </div>
        <div class="card-prompt">${q.prompt}</div>

        <div class="latex-bar" id="bar-${q.id}">
          ${LATEX_BTNS.map(b => b.sep
            ? '<span class="sep"></span>'
            : `<button type="button" onclick="insertLatex(${q.id},'${b.insert.replace(/'/g,"\\'")}')">${b.label}</button>`
          ).join('')}
        </div>

        <div class="field">
          <label>התשובה שלך (טקסט חופשי + LaTeX בתוך $...$):</label>
          <textarea id="ans-${q.id}" placeholder="כתבי כאן..." oninput="onType(${q.id})">${saved.answer||''}</textarea>
        </div>

        <div class="preview-box ${saved.answer ? 'visible' : ''}" id="preview-${q.id}"></div>

        <div class="field">
          <label>כמה את בטוחה?</label>
          <div class="confidence">
            <button onclick="setConf(${q.id},'strong')" id="c-${q.id}-strong" class="${saved.confidence==='strong'?'active-strong':''}">💪 חזקה</button>
            <button onclick="setConf(${q.id},'ok')" id="c-${q.id}-ok" class="${saved.confidence==='ok'?'active-ok':''}">🤔 ככה ככה</button>
            <button onclick="setConf(${q.id},'weak')" id="c-${q.id}-weak" class="${saved.confidence==='weak'?'active-weak':''}">😰 חלש</button>
          </div>
        </div>
      </div>
    `;
  });

  c.innerHTML = html;
  // render existing previews
  Q.forEach(q => { const s = load(q.id); if (s.answer) renderPreview(q.id, s.answer); });
  updateProgress();
}

// ════════════════════════════════════════
// LATEX TOOLBAR
// ════════════════════════════════════════
function insertLatex(id, tex) {
  const ta = document.getElementById('ans-' + id);
  const start = ta.selectionStart;
  const end = ta.selectionEnd;
  const before = ta.value.substring(0, start);
  const after = ta.value.substring(end);
  const wrapped = '$' + tex + '$';
  ta.value = before + wrapped + after;
  ta.focus();
  ta.selectionStart = ta.selectionEnd = start + wrapped.length;
  onType(id);
}

// ════════════════════════════════════════
// PREVIEW RENDERING
// ════════════════════════════════════════
function renderPreview(id, text) {
  const box = document.getElementById('preview-' + id);
  if (!text || !text.trim()) { box.classList.remove('visible'); return; }
  box.classList.add('visible');

  // Split on $...$ and render
  const parts = text.split(/(\$[^$]+\$)/g);
  let html = '';
  parts.forEach(part => {
    if (part.startsWith('$') && part.endsWith('$')) {
      const tex = part.slice(1, -1);
      try {
        html += katex.renderToString(tex, { throwOnError: false, displayMode: false });
      } catch { html += part; }
    } else {
      html += part.replace(/\n/g, '<br>');
    }
  });
  box.innerHTML = html;
}

// ════════════════════════════════════════
// STORAGE
// ════════════════════════════════════════
const KEY = 'quiz-defs-v1-';
function load(id) { try { return JSON.parse(localStorage.getItem(KEY+id)||'{}'); } catch { return {}; } }
function save(id, data) { localStorage.setItem(KEY+id, JSON.stringify(data)); }

function onType(id) {
  const ans = document.getElementById('ans-'+id).value;
  const s = load(id); s.answer = ans; save(id, s);
  renderPreview(id, ans);
  updateProgress();
}

function setConf(id, level) {
  const s = load(id); s.confidence = level; save(id, s);
  ['strong','ok','weak'].forEach(l => {
    document.getElementById(`c-${id}-${l}`).className = l===level ? `active-${l}` : '';
  });
  updateProgress();
}

function updateProgress() {
  let filled = 0;
  Q.forEach(q => { const s = load(q.id); if (s.answer && s.answer.trim().length > 3) filled++; });
  const pct = Math.round((filled/Q.length)*100);
  document.getElementById('pFill').style.width = pct + '%';
  document.getElementById('pTxt').textContent = `${filled} / ${Q.length} הושלמו`;
}

// ════════════════════════════════════════
// DOWNLOAD
// ════════════════════════════════════════
function download() {
  const now = new Date();
  const d = now.toLocaleDateString('he-IL') + ' ' + now.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
  let txt = `# חזרה על הגדרות — אינפי 1\n# תאריך: ${d}\n\n`;
  let strong=0, ok=0, weak=0, empty=0;

  Q.forEach(q => {
    const s = load(q.id);
    const ans = (s.answer||'').trim();
    const conf = s.confidence || 'לא סומן';
    if (conf==='strong') strong++; else if (conf==='ok') ok++; else if (conf==='weak') weak++;
    if (!ans) empty++;
    txt += `---\n## ${q.id}. ${q.name}\n`;
    txt += `שאלה: ${q.prompt}\n\n`;
    txt += `תשובה: ${ans || '(ריק)'}\n\n`;
    txt += `ביטחון: ${conf==='strong'?'💪 חזקה':conf==='ok'?'🤔 ככה ככה':conf==='weak'?'😰 חלש':'❓ לא סומן'}\n\n`;
  });

  txt += `---\n\n# סיכום\n- 💪 חזקה: ${strong}\n- 🤔 ככה ככה: ${ok}\n- 😰 חלש: ${weak}\n- ריקים: ${empty}\n`;

  const blob = new Blob([txt], { type: 'text/markdown;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `quiz-definitions-${now.toISOString().slice(0,10)}.md`;
  a.click();
}

function clearAll() {
  if (!confirm('בטוחה שאת רוצה למחוק את כל התשובות?')) return;
  Q.forEach(q => localStorage.removeItem(KEY+q.id));
  render();
}

render();
</script>
</body>
</html>
